<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DecodeLabs API Tester</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: #232736;
    --accent: #4fffb0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #e8eaf0;
    --muted: #6b7280;
    --get: #4fffb0;
    --post: #60a5fa;
    --put: #ffd166;
    --delete: #ff6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 800; color: #0d0f14;
  }

  header h1 { font-size: 1.4rem; font-weight: 800; }
  header span { color: var(--muted); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; }

  .status-pill {
    margin-left: auto;
    background: rgba(79,255,176,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.3rem 0.9rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 73px);
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    overflow-y: auto;
  }

  .sidebar h2 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-left: 0.5rem;
  }

  .endpoint-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0.75rem;
    border-radius: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    margin-bottom: 0.3rem;
    transition: background 0.15s;
    text-align: left;
  }

  .endpoint-btn:hover { background: var(--border); }
  .endpoint-btn.active { background: rgba(79,255,176,0.08); }

  .method-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    min-width: 52px;
    text-align: center;
  }

  .tag-GET    { background: rgba(79,255,176,0.15); color: var(--get); }
  .tag-POST   { background: rgba(96,165,250,0.15); color: var(--post); }
  .tag-PUT    { background: rgba(255,209,102,0.15); color: var(--put); }
  .tag-DELETE { background: rgba(255,107,107,0.15); color: var(--delete); }

  .endpoint-path {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
  }

  /* Main panel */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .request-panel {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .request-panel h2 {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 0.3rem;
  }

  .request-panel p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .url-bar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.2rem;
    align-items: center;
  }

  .method-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    min-width: 80px;
    text-align: center;
  }

  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .url-input:focus { border-color: var(--accent); }

  .send-btn {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.5rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.98); }

  .body-section label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: block;
    margin-bottom: 0.5rem;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }

  /* Response panel */
  .response-panel {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 2.5rem 2rem;
  }

  .response-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .response-header h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .status-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 0.2rem 0.7rem;
    border-radius: 6px;
  }

  .status-2xx { background: rgba(79,255,176,0.15); color: var(--get); }
  .status-4xx { background: rgba(255,107,107,0.15); color: var(--delete); }
  .status-5xx { background: rgba(255,107,107,0.15); color: var(--delete); }

  .response-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    min-height: 120px;
  }

  .key   { color: #60a5fa; }
  .str   { color: #4fffb0; }
  .num   { color: #ffd166; }
  .bool  { color: #f472b6; }
  .null  { color: var(--muted); }

  .placeholder-text {
    color: var(--muted);
    font-style: italic;
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
  }

  .loading { color: var(--accent); animation: pulse 1s infinite; }

  .note {
    background: rgba(255,209,102,0.08);
    border: 1px solid rgba(255,209,102,0.25);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.78rem;
    color: var(--accent3);
    margin-bottom: 1.2rem;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">DL</div>
  <div>
    <h1>DecodeLabs API Tester</h1>
    <span>Project 2 — Backend API Development</span>
  </div>
  <div class="status-pill">● Server: localhost:3000</div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Endpoints</h2>

    <button class="endpoint-btn active" onclick="selectEndpoint(this,'GET','http://localhost:3000/','Health Check','')">
      <span class="method-tag tag-GET">GET</span>
      <span class="endpoint-path">/</span>
    </button>

    <button class="endpoint-btn" onclick="selectEndpoint(this,'GET','http://localhost:3000/users','Get All Users','')">
      <span class="method-tag tag-GET">GET</span>
      <span class="endpoint-path">/users</span>
    </button>

    <button class="endpoint-btn" onclick="selectEndpoint(this,'GET','http://localhost:3000/users/1','Get User by ID','')">
      <span class="method-tag tag-GET">GET</span>
      <span class="endpoint-path">/users/:id</span>
    </button>

    <button class="endpoint-btn" onclick="selectEndpoint(this,'POST','http://localhost:3000/users','Create New User',JSON.stringify({name:'Amit Kumar',email:'amit@example.com',role:'user'},null,2))">
      <span class="method-tag tag-POST">POST</span>
      <span class="endpoint-path">/users</span>
    </button>

    <button class="endpoint-btn" onclick="selectEndpoint(this,'PUT','http://localhost:3000/users/1','Update User',JSON.stringify({name:'Rahul Updated',email:'rahul.new@example.com'},null,2))">
      <span class="method-tag tag-PUT">PUT</span>
      <span class="endpoint-path">/users/:id</span>
    </button>

    <button class="endpoint-btn" onclick="selectEndpoint(this,'DELETE','http://localhost:3000/users/2','Delete User','')">
      <span class="method-tag tag-DELETE">DELETE</span>
      <span class="endpoint-path">/users/:id</span>
    </button>

    <button class="endpoint-btn" onclick="selectEndpoint(this,'POST','http://localhost:3000/users','Test Validation (Bad Data)',JSON.stringify({name:'A',email:'not-an-email'},null,2))">
      <span class="method-tag tag-POST">POST</span>
      <span class="endpoint-path">/users (bad data)</span>
    </button>

    <button class="endpoint-btn" onclick="selectEndpoint(this,'GET','http://localhost:3000/users/999','Test 404','')">
      <span class="method-tag tag-GET">GET</span>
      <span class="endpoint-path">/users/999 (404)</span>
    </button>
  </div>

  <!-- Main Panel -->
  <div class="main">
    <div class="request-panel">
      <h2 id="endpoint-title">Health Check</h2>
      <p id="endpoint-desc">GET http://localhost:3000/</p>

      <div class="url-bar">
        <div class="method-display tag-GET" id="method-tag">GET</div>
        <input class="url-input" id="url-input" value="http://localhost:3000/" />
        <button class="send-btn" onclick="sendRequest()">▶ Send</button>
      </div>

      <div class="body-section" id="body-section" style="display:none">
        <label>Request Body (JSON)</label>
        <textarea id="body-input" placeholder='{"name": "John", "email": "john@example.com"}'></textarea>
      </div>

      <div class="note" id="server-note">
        ⚠️ Make sure your server is running: <strong>node server.js</strong> in the project folder
      </div>
    </div>

    <div class="response-panel">
      <div class="response-header">
        <h3>Response</h3>
        <span class="status-badge" id="status-badge" style="display:none"></span>
      </div>
      <div class="response-body" id="response-body">
        <div class="placeholder-text">← Select an endpoint and click Send</div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentMethod = 'GET';

  function selectEndpoint(btn, method, url, title, body) {
    document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    currentMethod = method;
    document.getElementById('url-input').value = url;
    document.getElementById('endpoint-title').textContent = title;
    document.getElementById('endpoint-desc').textContent = `${method} ${url}`;

    const methodTag = document.getElementById('method-tag');
    methodTag.textContent = method;
    methodTag.className = `method-display tag-${method}`;

    const bodySection = document.getElementById('body-section');
    if (method === 'POST' || method === 'PUT') {
      bodySection.style.display = 'block';
      document.getElementById('body-input').value = body;
    } else {
      bodySection.style.display = 'none';
    }

    document.getElementById('status-badge').style.display = 'none';
    document.getElementById('response-body').innerHTML = '<div class="placeholder-text">Click Send to make the request</div>';
  }

  async function sendRequest() {
    const url = document.getElementById('url-input').value;
    const method = currentMethod;
    const bodyEl = document.getElementById('body-input');
    const responseBody = document.getElementById('response-body');
    const statusBadge = document.getElementById('status-badge');

    responseBody.innerHTML = '<div class="placeholder-text loading">⟳ Sending request...</div>';
    statusBadge.style.display = 'none';

    try {
      const options = {
        method,
        headers: { 'Content-Type': 'application/json' }
      };

      if ((method === 'POST' || method === 'PUT') && bodyEl.value.trim()) {
        try {
          JSON.parse(bodyEl.value); // validate JSON first
          options.body = bodyEl.value;
        } catch(e) {
          responseBody.innerHTML = '<div class="placeholder-text" style="color:var(--delete)">✗ Invalid JSON in request body</div>';
          return;
        }
      }

      const res = await fetch(url, options);
      const data = await res.json();

      statusBadge.style.display = 'inline-block';
      statusBadge.textContent = `${res.status} ${res.statusText}`;

      if (res.status >= 200 && res.status < 300) {
        statusBadge.className = 'status-badge status-2xx';
      } else if (res.status >= 400 && res.status < 500) {
        statusBadge.className = 'status-badge status-4xx';
      } else {
        statusBadge.className = 'status-badge status-5xx';
      }

      responseBody.innerHTML = syntaxHighlight(JSON.stringify(data, null, 2));

    } catch (err) {
      statusBadge.style.display = 'inline-block';
      statusBadge.textContent = 'Connection Error';
      statusBadge.className = 'status-badge status-4xx';
      responseBody.innerHTML = `<div style="color:var(--delete)">✗ Could not connect to server.\n\nMake sure you ran: node server.js\n\nError: ${err.message}</div>`;
    }
  }

  function syntaxHighlight(json) {
    return json
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
        let cls = 'num';
        if (/^"/.test(match)) {
          cls = /:$/.test(match) ? 'key' : 'str';
        } else if (/true|false/.test(match)) {
          cls = 'bool';
        } else if (/null/.test(match)) {
          cls = 'null';
        }
        return `<span class="${cls}">${match}</span>`;
      });
  }
</script>
</body>
</html>
